name: guardpay_ai
description: GuardPay AI Fintech Banking App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # UI
  provider: ^6.0.5
  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0
  animate_do: ^3.3.4
  flutter_svg: ^2.0.9

  # Network
  http: ^1.2.0

  # Firebase (optional but already in your project)
  dependencies:
  firebase_core: ^2.30.0
  firebase_auth: ^4.17.0
  cloud_firestore: ^4.15.0

  # Permissions
  permission_handler: ^11.3.1

  # 🔥 QR SCANNER (IMPORTANT)
  mobile_scanner: ^3.5.5

  # 🖼️ Image picker (QR from gallery)
  image_picker: ^1.0.7

  # 🚀 OPTIONAL (future features)
  url_launcher: ^6.3.0
  shared_preferences: ^2.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/